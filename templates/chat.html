<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ bot.name }} | AI Restaurant Guide</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f8f9fa; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 250px; background-color: #212529; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #adb5bd; }
        .nav-link { display: block; padding: 12px; margin-bottom: 10px; color: white; text-decoration: none; border-radius: 8px; transition: background 0.2s; }
        .nav-link:hover { background-color: #343a40; }
        .nav-link.active { background-color: #495057; font-weight: bold; border-left: 4px solid #0d6efd; }
        
        /* Main Chat Area Styles */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 30px; max-width: 900px; margin: 0 auto; }
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0; color: #212529; }
        
        #chat-box { flex-grow: 1; background: white; padding: 20px; border-radius: 10px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #dee2e6; }
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user-msg { background-color: #0d6efd; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .bot-msg { background-color: #f1f3f5; color: #212529; margin-right: auto; border-bottom-left-radius: 2px; }
        
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 15px; border-radius: 8px; border: 1px solid #ced4da; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #0d6efd; }
        button.send-btn { padding: 15px 25px; border-radius: 8px; border: none; background-color: #0d6efd; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
        button.send-btn:hover { background-color: #0b5ed7; }
        button.clear-btn { background: none; border: none; color: #6c757d; text-decoration: underline; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard</h2>
        {% for key, p in personas.items() %}
            <a href="/chat/{{ key }}" class="nav-link {% if key == current_id %}active{% endif %}">
                {{ p.avatar }} {{ p.name }}
            </a>
        {% endfor %}
    </div>

    <div class="main-content">
        <div class="header">
            <h1>{{ bot.avatar }} {{ bot.name }}</h1>
        </div>
        
        <div id="chat-box">
            <div class="message bot-msg"><strong>{{ bot.name }}:</strong> {{ bot.greeting }}</div>
        </div>

        <div class="input-group">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <button class="clear-btn" onclick="clearChat()">Clear Chat History</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        // We inject the current bot's ID from Flask into JS
        const currentPersonaId = "{{ current_id }}";
        const botName = "{{ bot.name }}";

        function appendMessage(sender, text, isUser) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user-msg' : 'bot-msg');
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('You', text, true);
            userInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Send the specific persona ID to the backend
                    body: JSON.stringify({ message: text, persona: currentPersonaId })
                });
                
                const data = await response.json();
                if (data.reply) {
                    appendMessage(botName, data.reply, false);
                } else {
                    appendMessage('System', 'Error connecting to the AI.', false);
                }
            } catch (err) {
                appendMessage('System', 'Network error.', false);
            }
        }

        async function clearChat() {
            await fetch('/api/clear', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ persona: currentPersonaId }) 
            });
            chatBox.innerHTML = `<div class="message bot-msg"><strong>${botName}:</strong> History cleared. Let's start over.</div>`;
        }
    </script>
</body>
</html>
